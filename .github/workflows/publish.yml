name: Publish to Chrome Web Store

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: |
          zip -r MTK-AWSLauncher.zip \
            manifest.json \
            background.js \
            content.js \
            popup.js \
            popup.html \
            options.js \
            options.html \
            config-parser.js \
            icons/ \
            LICENSE \
            README.md \
            CHANGELOG.md

      - name: Upload to Chrome Web Store
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          EXTENSION_ID: copkcllbbkddonhallnciffiiedddkjk
        run: npx chrome-webstore-upload-cli@latest upload --source MTK-AWSLauncher.zip --skip-submit

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MTK-AWSLauncher.zip
          generate_release_notes: true
