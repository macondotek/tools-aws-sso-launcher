name: Publish to Chrome Web Store

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: |
          zip -r MTK-AWSLauncher.zip \
            manifest.json \
            background.js \
            content.js \
            popup.js \
            popup.html \
            options.js \
            options.html \
            config-parser.js \
            icons/ \
            LICENSE \
            README.md \
            CHANGELOG.md

      - name: Upload to Chrome Web Store
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          EXTENSION_ID: copkcllbbkddonhallnciffiiedddkjk
          PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
        run: npx chrome-webstore-upload-cli@latest upload --source MTK-AWSLauncher.zip --skip-submit

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} MTK-AWSLauncher.zip \
            --title "${{ github.ref_name }}" \
            --generate-notes
